<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wald-Entdecker</title>
    <style>
        :root {
            --forstgruen: #154734;      
            --weiss: #ffffff;
            --schwarz: #2d2a26;
            --grau: #f4f4f4;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #11382a;
            color: var(--schwarz);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: background-color 0.4s ease;
            background-color: var(--forstgruen);
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--weiss);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-circle {
            background-color: rgba(255,255,255,0.2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .header-titles h1 {
            margin: 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .header-titles p {
            margin: 2px 0 0 0;
            font-size: 20px;
            font-weight: bold;
        }

        .station-badge {
            background-color: rgba(0,0,0,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        main {
            flex: 1;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 25px 20px;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: var(--weiss);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: var(--weiss);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .card p {
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            color: #4a4a4a;
            white-space: pre-line;
        }

        .error-msg {
            background-color: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 15px 20px;
            margin-top: auto;
        }

        footer p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin: 0;
        }
    </style>
</head>
<body>

<header id="category-header">
    <div class="header-content">
        <div class="header-left">
            <div class="icon-circle" id="kat-icon">🌲</div>
            <div class="header-titles">
                <h1 id="kat-text">Wald-Entdecker</h1>
                <p id="thema-label">Lade Station...</p>
            </div>
        </div>
        <div class="station-badge" id="station-number">Station --</div>
    </div>
</header>

<main>
    <div class="cards-container" id="cards-container">
        <!-- Dynamischer Inhalt aus der CSV wird hier injiziert -->
    </div>
</main>

<footer>
    <p>&copy; 2026 Landesforstanstalt Mecklenburg-Vorpommern</p>
</footer>

<script>
    // RFC 4180 konformer CSV-Zeilen-Parser
    function parseCSVLine(text) {
        let p = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') {
                if (q && text[i+1] === '"') { p += '"'; i++; }
                else { q = !q; }
            }
            else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
            else { p += c; }
        }
        r.push(p.trim());
        return r;
    }

    // Wandelt den CSV-Rohtext in das stationsKatalog-Objekt um
    function csvToKatalog(csvText) {
        const lines = csvText.replace(/\r\n/g, '\n').split('\n');
        if (lines.length < 2) return {};

        const headers = parseCSVLine(lines[0]);
        const katalog = {};

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            const values = parseCSVLine(lines[i]);
            const row = {};
            headers.forEach((h, idx) => { row[h] = values[idx] || ""; });

            let rawID = row["ID"] || "";
            const idMatch = rawID.match(/\d+/);
            const stationID = idMatch ? idMatch[0] : rawID.trim();

            if (!stationID) continue;

            // ANPASSUNG AN DIE VERSCHOBENEN SPALTEN DEINER CSV:
            // In Spalte 'Icon' steht die echte Farbe (z.B. #91ae2d)
            // In Spalte 'Kategorie' steht das echte Icon (z.B. 🐿️)
            // In Spalte 'Thema' steht die echte Kategorie/Thema (z.B. Bestimmungsschlüssel)
            let finaleFarbe = row["Icon"] && row["Icon"].startsWith('#') ? row["Icon"] : "#154734";
            let finalesIcon = row["Kategorie"] && !row["Kategorie"].startsWith('#') ? row["Kategorie"] : "🐿️";
            let finalesThema = row["Thema"] || "Information";

            const bereiche = [];
            // Iteriert durch die Spalten-Paare Titel_1/Text_1 bis Titel_9/Text_9
            for (let j = 1; j <= 9; j++) {
                const tKey = `Titel_${j}`;
                const txtKey = `Text_${j}`;
                
                if (row[tKey] && row[txtKey] && row[tKey] !== "NaN" && row[txtKey] !== "NaN" && row[tKey] !== "undefined" && row[txtKey] !== "undefined") {
                    let titleValue = (row[tKey] || "").toString().trim();
                    let textValue = (row[txtKey] || "").toString().trim();

                    // HEURISTIK: Wenn die Spalten vertauscht sein könnten, tauschen.
                    // Kriterien (konservativ):
                    // - Wenn der Titel wie langer Fließtext aussieht (sehr lang, Satzzeichen oder Zeilenumbrüche)
                    //   und der Text dagegen kurz ist, dann tauschen.
                    const titleLooksLikeLongText = titleValue.length > 80 || /[.!?]\s/.test(titleValue) || titleValue.includes('\n');
                    const textLooksShort = textValue.length < 80 && !textValue.includes('\n');

                    if (titleLooksLikeLongText && textLooksShort) {
                        // Tausche
                        const tmp = titleValue;
                        titleValue = textValue;
                        textValue = tmp;
                        console.info(`Tausch Titel/Text bei Station ${stationID}, Felder ${tKey}/${txtKey}`);
                    }

                    // Erkennung und saubere Formatierung von JSON-Bestimmungsschlüsseln
                    if (textValue.trim().startsWith('[')) {
                        try {
                            const cleanJson = textValue.replace(/""/g, '"');
                            const jsonArray = JSON.parse(cleanJson);
                            
                            jsonArray.forEach(item => {
                                bereiche.push({
                                    // Setzt die Variante (z.B. "Auswahl 1a") als Überschrift
                                    titel: item.var ? `Auswahl ${item.var}` : titleValue,
                                    // Schreibt den langen Merkmalstext sauber in den Fließtext
                                    text: `${item.merkmale}\n\n➜ Weiter zu: ${item.weiter}`
                                });
                            });
                            continue; 
                        } catch (e) {
                            console.warn("JSON-Parsing fehlgeschlagen bei Station " + stationID, e);
                        }
                    }

                    // Standard-Inhaltsblöcke (z.B. Forstliche Begriffe)
                    bereiche.push({
                        titel: titleValue,
                        text: textValue
                    });
                }
            }

            katalog[stationID] = {
                kategorie: "Rundweg",
                icon: finalesIcon,
                thema: finalesThema,
                farbe: finaleFarbe,
                bereiche: bereiche
            };
        }
        return katalog;
    }

    async function renderStation() {
        const urlParams = new URLSearchParams(window.location.search);
        const stationID = urlParams.get('id') || "2"; 

        try {
            const response = await fetch('daten_rundweg_lanz.csv');
            if (!response.ok) throw new Error("Die Datei 'daten_rundweg_lanz.csv' konnte nicht geladen werden.");
            
            const csvText = await response.text();
            const stationsKatalog = csvToKatalog(csvText);
            const s = stationsKatalog[stationID];

            if (s) {
                const farbe = s.farbe;

                // Dynamisches Styling über die ausgelesene Farbe steuern
                document.getElementById('category-header').style.backgroundColor = farbe;
                document.getElementById('kat-icon').textContent = s.icon;
                document.getElementById('kat-text').textContent = s.kategorie;
                document.getElementById('thema-label').textContent = s.thema;
                document.getElementById('station-number').textContent = "Station " + stationID.padStart(2, '0');

                const container = document.getElementById('cards-container');
                container.innerHTML = "";

                s.bereiche.forEach((bereich, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const stepNum = document.createElement('div');
                    stepNum.className = 'step-num';
                    stepNum.style.backgroundColor = farbe; // Färbt die Kachelnummerierung passend ein
                    stepNum.textContent = index + 1;
                    
                    const title = document.createElement('h2');
                    title.appendChild(stepNum);
                    title.appendChild(document.createTextNode(bereich.titel));
                    
                    const text = document.createElement('p');
                    text.textContent = bereich.text;
                    
                    card.appendChild(title);
                    card.appendChild(text);
                    container.appendChild(card);
                });
            } else {
                document.getElementById('thema-label').textContent = "Nicht gefunden";
                document.getElementById('cards-container').innerHTML = `<div class="error-msg">Station ${stationID} wurde in der CSV-Datei nicht gefunden.</div>`;
            }
        } catch (error) {
            console.error(error);
            document.getElementById('thema-label').textContent = "Fehler";
            document.getElementById('cards-container').innerHTML = `<div class="error-msg">Fehler beim Laden der Daten: ${error.message}</div>`;
        }
    }

    window.addEventListener('load', renderStation);
</script>

</body>
</html>
