<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rundweg Lanz – Wald-Entdecker</title>
    <style>
        :root {
            --forstgruen: #154734;      
            --weiss: #ffffff;
            --schwarz: #2d2a26;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--forstgruen);
            color: var(--schwarz);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: background-color 0.4s ease;
        }

        .header-content {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #kat-label {
            color: white;
            margin: 0;
            font-size: 1rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kat-icon {
            font-size: 1.2rem;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 6px 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
        }

        #station-number {
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 15px;
        }

        .intro {
            text-align: center;
            color: var(--weiss);
            margin-bottom: 30px;
        }

        h1 { margin:0; font-size: 2.2rem; color: var(--weiss); }

        .card {
            background: var(--weiss);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--forstgruen);
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }

        .step-num {
            color: var(--weiss);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            flex-shrink: 0;
            transition: background-color 0.4s ease;
        }

        p { line-height: 1.6; font-size: 1.05rem; margin: 0; color: #333; }

        /* Spezial-Styles für Bestimmungsschlüssel */
        .key-entry {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .key-entry:last-child { border-bottom: none; }
        .key-var {
            font-weight: bold;
            color: var(--forstgruen);
            min-width: 60px;
            flex-shrink: 0;
        }
        .key-merkmale { flex: 1; }
        .key-weiter {
            font-weight: bold;
            color: #C36015;
            min-width: 80px;
            text-align: right;
            flex-shrink: 0;
        }

        .error-msg {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            color: #c0392b;
            text-align: center;
        }

        footer {
            text-align: center;
            padding:0 20px 5px 20px;
            margin-top: auto;
        }

        footer p {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
        }
    </style>
<base target="_blank">
</head>
<body>

<header id="category-header">
    <div class="header-content">
        <h1 id="kat-label">
            <span class="kat-icon" id="kat-icon">🐿️</span>
            <span id="kat-text">Rundweg Lanz</span>
        </h1>
        <span id="station-number">Station --</span>
    </div>
</header>

<div class="container">
    <div class="intro">
        <h1 id="thema-label">Lade...</h1>
    </div>

    <div id="cards-container">
    </div>
</div>

<footer>
    <p>&copy; 2026 Landesforstanstalt Mecklenburg-Vorpommern</p>
</footer>

<script>
    // RFC 4180 konformer CSV-Zeilen-Parser
    function parseCSVLine(text) {
        let p = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') {
                if (q && text[i+1] === '"') { p += '"'; i++; }
                else { q = !q; }
            }
            else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
            else { p += c; }
        }
        r.push(p.trim());
        return r;
    }

    // Wandelt den CSV-Rohtext in ein strukturiertes Objekt um
    function csvToKatalog(csvText) {
        const lines = csvText.replace(/\r\n/g, '\n').split('\n');
        if (lines.length < 2) return {};

        const headers = parseCSVLine(lines[0]);
        const katalog = {};

        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;

            const values = parseCSVLine(lines[i]);
            const row = {};
            headers.forEach((h, idx) => { row[h] = values[idx] || ""; });

            let rawID = row["ID"] || "";
            const idMatch = rawID.match(/\d+/);
            const stationID = idMatch ? idMatch[0] : rawID.trim();

            if (!stationID) continue;

            // KORREKTUR: Falls die Spalten in der CSV vertauscht sind und im Icon ein Farbcode steht
            let finaleFarbe = row["Farbe"] && row["Farbe"] !== "?" ? row["Farbe"] : "#154734";
            let finalesIcon = row["Icon"] || "🐿️";

            if (finalesIcon.startsWith('#')) {
                finaleFarbe = finalesIcon; // Nimm den Farbcode aus der Icon-Spalte
                finalesIcon = "🐿️";        // Setze ein Standard-Icon, da keins da ist
            }

            const bereiche = [];
            for (let j = 1; j <= 9; j++) {
                const tKey = `Titel_${j}`;
                const txtKey = `Text_${j}`;

                if (row[tKey] && row[txtKey] && row[tKey] !== "NaN" && row[txtKey] !== "NaN") {
                    let textValue = row[txtKey];

                    if (textValue.trim().startsWith('[')) {
                        try {
                            const cleanJson = textValue.replace(/""/g, '"');
                            const jsonArray = JSON.parse(cleanJson);

                            jsonArray.forEach(item => {
                                bereiche.push({
                                    // Die Frage (var) kommt in h2, die Erklärung in p
                                    titel: item.var ? `Auswahl ${item.var}` : row[tKey],
                                    text: `${item.merkmale}\n\n➜ Weiter zu: ${item.weiter}`,
                                    isKey: true
                                });
                            });
                            continue; 
                        } catch (e) {
                            console.warn("JSON-Parsing fehlgeschlagen bei Station " + stationID, e);
                        }
                    }

                    bereiche.push({
                        // Titel = Frage (h2), Text = Erklärung (p)
                        titel: row[tKey],
                        text: textValue,
                        isKey: false
                    });
                }
            }

            katalog[stationID] = {
                kategorie: row["Kategorie"] || "Rundweg",
                icon: finalesIcon,
                thema: row["Thema"] || "Information",
                farbe: finaleFarbe,
                bereiche: bereiche
            };
        }
        return katalog;
    }

    async function renderStation() {
        const urlParams = new URLSearchParams(window.location.search);
        const stationID = urlParams.get('id') || "1"; 

        try {
            const response = await fetch('daten_rundweg_lanz.csv');
            if (!response.ok) throw new Error("Die Datei 'daten_rundweg_lanz.csv' konnte nicht geladen werden.");

            const csvText = await response.text();
            const stationsKatalog = csvToKatalog(csvText);
            const s = stationsKatalog[stationID];

            if (s) {
                const farbe = s.farbe;

                // Setzt die korrekte Hintergrundfarbe für den Header
                document.getElementById('category-header').style.backgroundColor = farbe;
                document.getElementById('kat-icon').textContent = s.icon;
                document.getElementById('kat-text').textContent = s.kategorie;
                document.getElementById('thema-label').textContent = s.thema;
                document.getElementById('station-number').textContent = "Station " + stationID.padStart(2, '0');

                const container = document.getElementById('cards-container');
                container.innerHTML = "";

                s.bereiche.forEach((bereich, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    const stepNum = document.createElement('div');
                    stepNum.className = 'step-num';
                    stepNum.style.backgroundColor = farbe;
                    stepNum.textContent = index + 1;

                    // h2 = Titel/Frage (oben)
                    const title = document.createElement('h2');
                    title.appendChild(stepNum);
                    title.appendChild(document.createTextNode(bereich.titel));

                    // p = Text/Erklärung (unten)
                    const text = document.createElement('p');

                    // Bestimmungsschlüssel: spezielle Darstellung
                    if (bereich.isKey) {
                        const parts = bereich.text.split('\n\n➜ Weiter zu: ');
                        text.innerHTML = `<div class="key-entry">
                            <span class="key-merkmale">${parts[0]}</span>
                            <span class="key-weiter">${parts[1] || ''}</span>
                        </div>`;
                    } else {
                        text.textContent = bereich.text;
                    }

                    // Reihenfolge: h2 (Titel/Frage) zuerst, dann p (Text/Erklärung)
                    card.appendChild(title);
                    card.appendChild(text);
                    container.appendChild(card);
                });
            } else {
                document.getElementById('thema-label').textContent = "Nicht gefunden";
                document.getElementById('cards-container').innerHTML = `<div class="error-msg">Station ${stationID} wurde in der CSV-Datei nicht gefunden.</div>`;
            }
        } catch (error) {
            console.error(error);
            document.getElementById('thema-label').textContent = "Fehler";
            document.getElementById('cards-container').innerHTML = `<div class="error-msg">Fehler beim Laden der Daten: ${error.message}</div>`;
        }
    }

    window.addEventListener('load', renderStation);
</script>

</body>
</html>
